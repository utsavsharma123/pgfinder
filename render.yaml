services:
  # ── Django Web Service (Gunicorn + Daphne for WebSockets) ─────────────────────
  - type: web
    name: pg-finder-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT pg_finder.asgi:application"
    plan: starter  # upgrade to standard for production
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: pg_finder.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-nextjs-app.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: pg-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pg-finder-redis
          property: connectionString
      # ── Optional — add these in Render dashboard ──────────────────────────────
      # - key: USE_S3
      #   value: "True"
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_STORAGE_BUCKET_NAME
      #   sync: false
      # - key: AWS_S3_REGION_NAME
      #   value: ap-south-1
      # - key: SENDGRID_API_KEY
      #   sync: false
      # - key: MSG91_AUTH_KEY
      #   sync: false
      # - key: RAZORPAY_KEY_ID
      #   sync: false
      # - key: RAZORPAY_KEY_SECRET
      #   sync: false

  # ── Celery Worker ──────────────────────────────────────────────────────────────
  - type: worker
    name: pg-finder-celery
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A pg_finder worker --loglevel=info"
    plan: starter
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: pg_finder.settings
      - key: SECRET_KEY
        fromService:
          type: web
          name: pg-finder-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: pg-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pg-finder-redis
          property: connectionString

databases:
  - name: pg-finder-db
    databaseName: pg_finder
    user: pg_finder_user
    plan: starter  # upgrade to standard for production

  - name: pg-finder-redis
    type: redis
    plan: starter
    ipAllowList: []
